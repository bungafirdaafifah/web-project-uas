{% extends "base.html" %}

{% block title %}Login Administrator — KasKu{% endblock %}

{% block content %}
<section class="d-flex align-items-center justify-content-center" style="min-height: 80vh; padding: 3rem 0; position: relative; z-index: 1;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="glass-card p-4 p-md-5 reveal visible" style="opacity: 1; transform: translateY(0);">
          
          <!-- Header -->
          <div class="text-center mb-4">
            <div class="d-inline-flex align-items-center justify-content-center bg-indigo mb-3" style="width: 60px; height: 60px; border-radius: 50%; font-size: 1.8rem;">
              🔑
            </div>
            <h3 class="fw-800">Login <span class="gradient-text">Admin</span></h3>
            <p class="text-muted" style="font-size: 0.88rem;">Masukkan kredensial Anda untuk masuk ke Dashboard.</p>
          </div>

          <!-- Form -->
          <form action="{{ url_for('auth.login') }}" method="POST" class="needs-validation" novalidate>
            <!-- Username -->
            <div class="mb-3">
              <label for="username" class="form-label fw-600" style="font-size: 0.85rem; color: var(--text-light);">Username</label>
              <div class="input-group">
                <span class="input-group-text border-glass text-muted" style="background: rgba(255,255,255,0.03); border-right: none;">
                  <i class="bi bi-person-fill"></i>
                </span>
                <input type="text" class="form-control border-glass text-white" id="username" name="username" 
                       placeholder="Masukkan username" required autocomplete="username"
                       style="background: rgba(255,255,255,0.03); border-left: none; font-size: 0.9rem;">
                <div class="invalid-feedback">Username wajib diisi.</div>
              </div>
            </div>

            <!-- Password -->
            <div class="mb-4">
              <label for="password" class="form-label fw-600" style="font-size: 0.85rem; color: var(--text-light);">Password</label>
              <div class="input-group">
                <span class="input-group-text border-glass text-muted" style="background: rgba(255,255,255,0.03); border-right: none;">
                  <i class="bi bi-lock-fill"></i>
                </span>
                <input type="password" class="form-control border-glass text-white" id="password" name="password" 
                       placeholder="Masukkan password" required autocomplete="current-password"
                       style="background: rgba(255,255,255,0.03); border-left: none; font-size: 0.9rem;">
                <div class="invalid-feedback">Password wajib diisi.</div>
              </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-primary-custom w-100 py-2.5 justify-content-center fw-700" style="font-size: 0.95rem;">
              <i class="bi bi-box-arrow-in-right"></i> Masuk Sekarang
            </button>
          </form>

          <!-- Help Text -->
          <div class="text-center mt-4">
            <a href="{{ url_for('public.tentang') }}" class="text-muted" style="font-size: 0.8rem;">
              <i class="bi bi-question-circle"></i> Butuh bantuan akses masuk?
            </a>
          </div>

        </div>
      </div>
    </div>
  </div>
</section>

<!-- Bootstrap Form Validation Script -->
<script>
  (() => {
    'use strict'
    const forms = document.querySelectorAll('.needs-validation')
    Array.from(forms).forEach(form => {
      form.addEventListener('submit', event => {
        if (!form.checkValidity()) {
          event.preventDefault()
          event.stopPropagation()
        }
        form.classList.add('was-validated')
      }, false)
    })
  })()
</script>
{% endblock %}
